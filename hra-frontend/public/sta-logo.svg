<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 96">
  <defs>
    <clipPath id="hex">
      <!-- Pointy-side hexagon: left/right points, flat top/bottom edges -->
      <polygon points="24,4 72,4 93,48 72,92 24,92 3,48"/>
    </clipPath>
  </defs>

  <!-- Hexagon dark navy background -->
  <polygon points="24,4 72,4 93,48 72,92 24,92 3,48" fill="#0D2366"/>

  <!-- 3 diagonal white stripes clipped inside hexagon -->
  <!-- Each parallelogram goes from bottom-left to top-right (~20° angle) -->
  <g clip-path="url(#hex)">
    <!-- Stripe 1 (top) -->
    <polygon points="-5,10 100,-4 100,14 -5,28" fill="white"/>
    <!-- Stripe 2 (middle) -->
    <polygon points="-5,40 100,26 100,44 -5,58" fill="white"/>
    <!-- Stripe 3 (bottom) -->
    <polygon points="-5,70 100,56 100,74 -5,88" fill="white"/>
  </g>

  <!-- STA text - bold dark navy -->
  <text x="106" y="68"
    font-family="'Arial Black','Franklin Gothic Heavy','Arial Bold',sans-serif"
    font-weight="900"
    font-size="56"
    fill="#0D2366">STA</text>

  <!-- TECHNOLOGIES subtext - medium blue -->
  <text x="108" y="85"
    font-family="Arial,Helvetica,sans-serif"
    font-weight="700"
    font-size="12"
    fill="#1565C0"
    letter-spacing="5">TECHNOLOGIES</text>
</svg>
